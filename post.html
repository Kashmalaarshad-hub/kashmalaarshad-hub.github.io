---
layout: default
---

<div class="post-page">
  <div class="post-header">
    <div class="post-meta-top">
      <span class="post-category">{{ page.categories | first }}</span>
      <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
    </div>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="post-subtitle">{{ page.description }}</p>
    {% endif %}
  </div>

  <article class="post-content">
    {{ content }}
  </article>

  <div class="post-footer">
    <a href="{{ '/blog' | relative_url }}" class="btn-back">← Back to Blog</a>
  </div>
</div>
