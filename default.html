<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="{{ '/' | relative_url }}">✿ Kashmala</a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/about' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>About</a></li>
        <li><a href="{{ '/blog' | relative_url }}" {% if page.url contains 'blog' %}class="active"{% endif %}>Blog</a></li>
        <li><a href="{{ '/contact' | relative_url }}" {% if page.url contains 'contact' %}class="active"{% endif %}>Contact</a></li>
      </ul>
      <button class="hamburger" onclick="toggleMenu()">☰</button>
    </div>
    <ul class="mobile-menu" id="mobileMenu">
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/about' | relative_url }}">About</a></li>
      <li><a href="{{ '/blog' | relative_url }}">Blog</a></li>
      <li><a href="{{ '/contact' | relative_url }}">Contact</a></li>
    </ul>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>© 2026 Kashmala Arshad &nbsp;·&nbsp; CE Student at UET Faisalabad &nbsp;·&nbsp; Made with 💗</p>
    <div class="footer-links">
      <a href="https://github.com/Kashmalaarshad-hub" target="_blank">GitHub</a>
      <a href="#">LinkedIn</a>
    </div>
  </footer>

  <script>
    function toggleMenu() {
      const m = document.getElementById('mobileMenu');
      m.classList.toggle('open');
    }
  </script>
</body>
</html>
